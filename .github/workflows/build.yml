name: Build Bushiri Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh

      - name: Configure arduino-cli and install ESP32
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8

      - name: Install required libraries
        run: |
          arduino-cli lib install "ArduinoJson@7.4.3"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            --export-binaries \
            ./bushiri_v33/bushiri_v33.ino

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: bushiri-firmware-${{ github.run_number }}
          path: ./build/*.bin
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.3.${{ github.run_number }}
          name: "Bushiri v3.3.${{ github.run_number }}"
          body: |
            ## Bushiri Firmware v3.3.${{ github.run_number }}
            - APSTA Mode + NAT Routing
            - Captive Portal (Android/iOS/Windows)
            - MIXX/MPESA Verify via VPS
            - OTA Update
            ### Flash:
            ```
            esptool.py --chip esp32 write_flash 0x10000 bushiri_v33.ino.bin
            ```
          files: ./build/*.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
