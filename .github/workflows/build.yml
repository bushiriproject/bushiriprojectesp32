name: Build Bushiri Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # Tumia esp32 core 3.3.8 (ikilingana na ile iliyopo kwenye runner)
      - name: Install ESP32 board support
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8

      # ArduinoJson v7 (inayolingana na ile inayosakinishwa na runner)
      - name: Install required libraries
        run: |
          arduino-cli lib install "ArduinoJson@7.4.3"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            --export-binaries \
            ./bushiri_v33/bushiri_v33.ino
          echo "✅ Compile imefanikiwa!"

      - name: List build output
        run: ls -lh ./build/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: bushiri-firmware-${{ github.run_number }}
          path: ./build/*.bin
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.3.${{ github.run_number }}
          name: "Bushiri v3.3.${{ github.run_number }}"
          body: |
            ## 🚀 Bushiri Firmware v3.3.${{ github.run_number }}
            
            ### Marekebisho ya v3.3:
            - ✅ Imerekebisha `ip_napt_enable()` void return (core v3.3.x)
            - ✅ Imerekebisha `JsonDocument` (ArduinoJson v7 - DynamicJsonDocument imetolewa)
            - ✅ File moja tu - hakuna redefinition errors
            - ✅ APSTA Mode + NAT Routing
            - ✅ Captive Portal (Android/iOS/Windows/Samsung)
            - ✅ MIXX/MPESA Verify via VPS
            - ✅ OTA Update
            - ✅ WiFi Config via admin panel
            
            ### Flash:
            ```
            esptool.py --chip esp32 write_flash 0x10000 bushiri_v33.ino.bin
            ```
          files: ./build/*.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
